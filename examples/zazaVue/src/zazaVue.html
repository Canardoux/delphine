<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cat Scratch Editor</title>
    <style>
      * {
        box-sizing: border-box;
      }
      #ir9k {
        margin-top: 0px;
        margin-right: 0px;
        margin-bottom: 0px;
        margin-left: 0px;
        color: rgb(42, 161, 182);
      }
      #button1 {
        color: rgb(255, 0, 0);
      }

      #buttonx {
        color: rgb(255, 0, 0);
        width: 100px;
        height: 100px;
      }

      #myvueplugin {
        color: rgb(255, 255, 0);
        background-color: rgb(0, 255, 255);
      }

      #mypanel {
        color: rgb(0, 255, 255);
        background-color: rgb(255, 255, 0);
        width: 300px;
        height: 300px;
      }

            #mydcc {
        color: rgb(4, 8, 0);
        background-color: rgb(123, 170, 188);
        width: 200px;
        height: 200px;
      }

    </style>
  </head>
  <body
    data-delphine-props='{
    "onclick": "zaza_onclick",
    "name": "ZAZA"
  }'
    id="ir9k"
    data-delphine-component="TForm"
    data-delphine-name="ZAZA"
    data-delphine-oncreate="onMyCreate"
    data-delphine-onshown="onMyShown"
  >
    <button
      id="button1"
      data-delphine-component="TButton"
      data-delphine-name="button1"
      data-delphine-props='{
    
    "onclick": "button1_onclick",
    "caption": "Delphine button1 caption",
    "enabled": true,
    "name": "button1"
  }'
    >
      zaza
    </button>

    <button
      id="buttonx"
      data-delphine-component="TButton"
      data-delphine-caption="Delphine buttonx caption"
      data-delphine-name="buttonx"
    >
      Titi
    </button>

    <h1 id="igfu">Mon titreX</h1>

    <div
      id="myvueplugin"
      data-delphine-name="myvueplugin"
      data-delphine-component="TPluginHost"
      data-delphine-plugin="hello-vue"
      data-delphine-message="Bonjour depuis Delphine!!!"
      data-delphine-props='{
    "message": "Hello depuis Delphinexxx",
    "count": 3,
    "enabled": true
  }'
    ></div>

    <div id="mypanel" data-delphine-name="myPanel" data-delphine-component="TPanel">
      <button
        data-delphine-component="TButton"
        data-delphine-caption="sub-button1"
        data-delphine-name="sub-button1"
        data-delphine-onclick="subButton1_onclick"
      >
        Click Me!
      </button>
      <button data-delphine-component="TButton" data-delphine-caption="sub-button2" data-delphine-name="sub-button2">
        Click Me
      </button>
    </div>

    <div
      id="mydcc"
      data-delphine-component="TMyDCC"
      data-delphine-plugin="hello-dcc"
      data-delphine-name="my-DCC"
      data-delphine-props='{"message":"Bonjour"}'
        >
      <button
        data-delphine-component="TButton"
        data-delphine-caption="dcc-button1"
        data-delphine-name="dcc-button1"
        data-delphine-onclick="dcc_onclick"
      >

    ></div>

    <script type="module" src="/src/zazaVue.ts"></script>
  </body>
</html>
